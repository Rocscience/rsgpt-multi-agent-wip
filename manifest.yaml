# Integration manifest — pins which Rocscience repos/branches form the multi-agent stack.
# The WIP repo does NOT duplicate application source; it orchestrates clones under repos/.
version: 1
integration: multi-agent-production

repos:
  rsgpt-ai-core:
    url: https://github.com/Rocscience/rsgpt-ai-core.git
    branch: feat/multi-agent-production-integration
    path: repos/rsgpt-ai-core
    port: 8090
    start: poetry run start

  rsgpt-be:
    url: https://github.com/Rocscience/rsgpt-be.git
    branch: feat/multi-agent-production-integration
    path: repos/rsgpt-be
    port: 8080
    start: poetry run start

  rsgpt-fe:
    url: https://github.com/Rocscience/rsgpt-fe.git
    branch: feat/multi-agent-production-integration
    path: repos/rsgpt-fe
    port: 3000
    start: npm run dev

  rsgpt-desktop:
    url: https://github.com/Rocscience/rsgpt-desktop.git
    branch: main
    path: repos/rsgpt-desktop
    port: 5173
    start: npm run dev
    notes: >
      MCP gateway + WebSocket to ai-core. Gateway timeout fixes and mcp-servers.json
      may be local-only until a desktop PR lands. Kill production RSInsight Desktop
      before npm run dev (single-instance lock).

# Known-good local commits (update after each verified integration run)
pins:
  rsgpt-ai-core: 495b1d3
  rsgpt-be: 98bfb93
  rsgpt-fe: 5aad934
  rsgpt-desktop: 96cd467
