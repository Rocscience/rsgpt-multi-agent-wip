version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: rsgpt_ai_core_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rsgpt_ai_core_db
      POSTGRES_USER: rsgpt_ai_core_user
      POSTGRES_PASSWORD: rsgpt_ai_core_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_ai_core_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsgpt_ai_core_user -d rsgpt_ai_core_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_ai_core_data:
