version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rsgpt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rsgpt_db
      POSTGRES_USER: rsgpt_user
      POSTGRES_PASSWORD: rsgpt_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsgpt_user -d rsgpt_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: 